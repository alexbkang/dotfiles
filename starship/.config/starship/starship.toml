format = """
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = 'custom'

[palettes.custom]
green = '#87a987'
gray = '#c3c3c4'
magenta = '#938aa9'

[fill]
style = 'fg:gray'

[directory]
style = 'fg:magenta'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'
