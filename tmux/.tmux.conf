set -g default-terminal "screen-256color"
set -as terminal-overrides ",*:Tc"

set -g mouse on
set -g mode-keys vi

unbind C-b
set -g prefix C-a
bind C-Space send-prefix

set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g base-index 1

accent="#6e94b2"
white="#c3c3c4"
dim="#777b7a"
highlight="#545456"

set -g status-position top
set -g status-style "bg=default"
set -g status-left-length 50
set -g status 2
set -g status-interval 1
set -g status-format[1] ""
set -g status-left "#[fg=$accent,bg=default] ď’‰ #[fg=$white,bg=default] #S "
set -g window-status-format "#[fg=$white,bg=default] #I #W "
set -g window-status-current-format "#[fg=$white,bg=$highlight] #I #W "
set -g status-right " #[fg=$accent,bg=default]%H:%M "
set -g message-style "bg=default fg=$dim"
